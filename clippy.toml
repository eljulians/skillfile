# Complexity and quality thresholds for clippy lints.
# See: https://doc.rust-lang.org/clippy/lint_configuration.html

cognitive-complexity-threshold = 10
too-many-lines-threshold = 60
too-many-arguments-threshold = 3
type-complexity-threshold = 250
excessive-nesting-threshold = 3
single-char-binding-names-threshold = 4
max-fn-params-bools = 2

# Warn when large types are passed by value (default 200 is aggressive)
too-large-for-stack = 512

# Flag enum variants much larger than siblings
enum-variant-size-threshold = 256
